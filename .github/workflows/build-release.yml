name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: cliphist-cosmic
  TARGET: x86_64-unknown-linux-gnu

jobs:
  build-and-upload:
    name: Build Linux Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfontconfig1-dev \
            libfreetype6-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            libegl1-mesa-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ env.TARGET }}

      - name: Build Release
        run: cargo build --release --locked --target ${{ env.TARGET }}

      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p staging
          cp "target/${{ env.TARGET }}/release/${{ env.BINARY_NAME }}" staging/
          cp README.md staging/
          cp CHANGELOG.md staging/

          RELEASE_NAME="${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ env.TARGET }}.tar.gz"

          tar -czf "$RELEASE_NAME" -C staging .

          echo "ASSET_PATH=$RELEASE_NAME" >> "$GITHUB_ENV"

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ env.TARGET }}
          path: ${{ env.ASSET_PATH }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true
